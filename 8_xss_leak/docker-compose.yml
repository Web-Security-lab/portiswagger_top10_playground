services:
  web:
    build: .
    command:
      - sh
      - -lc
      - npm start
    ports:
      - "18008:1337"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      - PORT=1337
      - DOMAIN=example.localhost
      - ATTACKER_DOMAIN=attacker.localhost
      - ATTACKER_UPSTREAM=http://host.docker.internal:3001
      - FLAG=wsl{Xss_13ak_M@5ter!}
      - DISABLE_SOCKET_POOL_RANDOMIZATION=false
      - MIRROR_FLAG_TO_EXPLOIT_ORIGIN=false
