{% extends "base.html" %}
{% block title %}Login — Polylot Notes{% endblock %}

{% block content %}
<div style="max-width:420px;margin:3rem auto;">
  <h1 style="text-align:center;margin-bottom:0.3rem;">Welcome back</h1>
  <p class="subtitle" style="text-align:center;margin-bottom:2rem;">Sign in to your Polylot account</p>

  <div class="card">
    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">
        Sign In
      </button>
    </form>

    <hr style="border:none;border-top:1px solid #30363d;margin:1.2rem 0;" />

    <p style="text-align:center;font-size:0.88rem;color:#6e7681;">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
