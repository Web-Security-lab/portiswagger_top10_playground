<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - SecureNotes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #eef0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      border: 1px solid #dde0e6;
      max-width: 440px;
      width: 100%;
      padding: 48px 40px;
    }
    .logo {
      font-size: 32px;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 32px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 8px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      transition: all 0.2s;
      outline: none;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5a6fd6;
    }
    .btn-primary:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      transform: none;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: #64748b;
    }
    .footer a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">SecureNotes</h1>
    <p class="subtitle">계정에 로그인하세요</p>

    <div id="error" class="error"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" id="submitBtn">로그인</button>
    </form>

    <div class="footer">
      계정이 없으신가요? <a href="/register.html">회원가입</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = '로그인 중...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.ok) {
          // 로그인 성공
          const params = new URLSearchParams(window.location.search);
          const raw = params.get('next') || '/notes.html';
          // 오픈 리다이렉트 방지: 상대 경로(/로 시작, //는 제외)만 허용
          const next = (raw.startsWith('/') && !raw.startsWith('//')) ? raw : '/notes.html';
          window.location.href = next;
        } else {
          errorEl.textContent = data.error || '로그인 실패';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = '로그인';
        }
      } catch (err) {
        errorEl.textContent = '네트워크 오류가 발생했습니다.';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
