<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortSwigger Top 10 Playground</title>
    <link rel="icon" href="{{ url_for('static', filename='wsl_logo.png') }}" type="image/png">
    <style>
        body { background-color: #f4f5f7; color: #333333; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header-container { text-align: center; margin-bottom: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background-color: #ffffff; border: 1px solid #e1e4e8; border-radius: 8px; padding: 25px; text-align: center; transition: all 0.3s ease; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 24px rgba(255, 94, 0, 0.15); border-color: #FF5E00; }
        .card h3 { margin: 15px 0 10px; font-size: 1.25rem; color: #24292e; line-height: 1.3;}
        .card p { color: #586069; font-size: 0.95rem; line-height: 1.5; margin-bottom: 0; }
        .badge { background-color: #fff0e6; color: #FF5E00; border: 1px solid #ffd1b3; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        
        .card.solved { background-color: #f6fcf4; border-color: #8bc34a; }
        .card.solved:hover { box-shadow: 0 8px 24px rgba(139, 195, 74, 0.25); border-color: #7cb342; }
        .card.solved .badge { background-color: #e8f5e9; color: #388e3c; border-color: #c8e6c9; }
        .card.solved h3 { color: #2e7d32; }
        .card.solved::after { content: "✔ Solved"; position: absolute; top: -12px; right: 15px; background-color: #8bc34a; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: #ffffff; width: 90%; max-width: 600px; border-radius: 8px; padding: 30px; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #999; line-height: 1; }
        .modal h2 { color: #FF5E00; margin-top: 0; border-bottom: 2px solid #fff0e6; padding-bottom: 10px; }
        .modal-desc { font-size: 1.05rem; color: #444; line-height: 1.6; margin: 20px 0; }
        
        /* --- 컨트롤 패널 UI --- */
        .control-panel { background-color: #f8f9fa; border: 1px solid #e1e4e8; border-radius: 6px; padding: 15px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .btn { padding: 8px 16px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-start { background-color: #28a745; color: white; }
        .btn-stop { background-color: #dc3545; color: white; }
        .btn-access { background-color: #007bff; color: white; text-decoration: none; display: inline-block; }
        .btn-access.disabled { background-color: #6c757d; pointer-events: none; }
        #dockerMsg { flex-grow: 1; text-align: right; font-size: 0.9rem; font-weight: bold; }

        .flag-box { background-color: #fafbfc; padding: 20px; border-radius: 6px; border: 1px dashed #ccc; }
        .input-group { display: flex; gap: 10px; }
        .flag-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .submit-btn { background-color: #FF5E00; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 15px; font-weight: bold; font-size: 0.95rem; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <h1 style="color: #FF5E00; margin-bottom: 5px;">PortSwigger</h1>
            <h2 style="color: #666; font-size: 1.2rem; margin-top: 0;">2025 Top 10 Playground</h2>
        </div>

        <div class="grid">
            {% for challenge in challenges %}
            <div class="card {% if challenge.id in solved_challenges %}solved{% endif %}" 
                 id="card-{{ challenge.id }}"
                 data-id="{{ challenge.id }}" 
                 data-name="{{ challenge.name }}" 
                 data-detail="{{ challenge.detail }}" 
                 data-port="{{ challenge.port }}"
                 onclick="openModal(this)">
                <div>
                    <span class="badge">Challenge #{{ challenge.id }}</span>
                    <h3>{{ challenge.name }}</h3>
                    <p>{{ challenge.description }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBgClick(event)">
        <div class="modal">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Challenge Title</h2>
            <p class="modal-desc" id="modalDetail">Challenge detail goes here.</p>
            
            <div class="control-panel">
                <button class="btn btn-start" id="btnStart" onclick="manageContainer('start')">▶ 인스턴스 시작</button>
                <button class="btn btn-stop" id="btnStop" onclick="manageContainer('stop')" style="display:none;">■ 인스턴스 종료</button>
                <a href="#" target="_blank" class="btn btn-access disabled" id="modalLabBtn">실습 접속 (대기중)</a>
                <span id="dockerMsg"></span>
            </div>
            
            <div class="flag-box">
                <h4 style="margin-top:0;">Submit Flag</h4>
                <div class="input-group">
                    <input type="hidden" id="chalId">
                    <input type="hidden" id="chalPort">
                    <input type="text" id="flagInput" class="flag-input" placeholder="WSL{...}" onkeypress="handleEnter(event)">
                    <button class="submit-btn" onclick="submitFlag()">Submit</button>
                </div>
                <div id="msg"></div>
            </div>
        </div>
    </div>

    <script>
        // 각 문제의 인스턴스 상태를 기억하는 전역 객체
        // 상태값: 'stopped'(기본), 'starting', 'running', 'stopping'
        const containerStates = {}; 

        function openModal(element) {
            const id = element.getAttribute('data-id');
            const port = element.getAttribute('data-port');
            const name = element.getAttribute('data-name');
            const detail = element.getAttribute('data-detail');

            document.getElementById('modalTitle').innerText = `Challenge #${id}: ${name}`;
            document.getElementById('modalDetail').innerText = detail;
            document.getElementById('chalId').value = id;
            document.getElementById('chalPort').value = port;
            
            // 입력창 초기화
            document.getElementById('flagInput').value = '';
            document.getElementById('msg').innerText = '';
            document.getElementById('msg').className = '';

            // --- 🌟 핵심: 기억해둔 상태를 불러와서 UI 복구 ---
            const currentState = containerStates[id] || 'stopped';
            const msgSpan = document.getElementById('dockerMsg');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            const labBtn = document.getElementById('modalLabBtn');

            labBtn.href = `http://localhost:${port}`;

            if (currentState === 'stopped') {
                msgSpan.innerText = '상태: 대기중';
                msgSpan.style.color = '#666';
                btnStart.style.display = 'inline-block';
                btnStart.disabled = false;
                btnStop.style.display = 'none';
                labBtn.classList.add('disabled');
                labBtn.innerText = `실습 접속 (Port: ${port})`;
            } 
            else if (currentState === 'starting') {
                msgSpan.innerText = '⏳ 컨테이너 기동 중...';
                msgSpan.style.color = '#FF5E00';
                btnStart.style.display = 'inline-block';
                btnStart.disabled = true;  // 중복 클릭 방지
                btnStop.style.display = 'none';
                labBtn.classList.add('disabled');
                labBtn.innerText = `실습 접속 (대기중)`;
            } 
            else if (currentState === 'running') {
                msgSpan.innerText = `환경 구동 완료 (Port: ${port})`;
                msgSpan.style.color = '#28a745';
                btnStart.style.display = 'none';
                btnStop.style.display = 'inline-block';
                btnStop.disabled = false;
                labBtn.classList.remove('disabled');
                labBtn.innerText = '🚀 실습 페이지로 이동';
            } 
            else if (currentState === 'stopping') {
                msgSpan.innerText = '⏳ 컨테이너 종료 중...';
                msgSpan.style.color = '#FF5E00';
                btnStart.style.display = 'none';
                btnStop.style.display = 'inline-block';
                btnStop.disabled = true; // 중복 클릭 방지
                labBtn.classList.add('disabled');
                labBtn.innerText = `실습 접속 (대기중)`;
            }

            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        function closeModalOnBgClick(event) { if (event.target === document.getElementById('modalOverlay')) closeModal(); }
        function handleEnter(event) { if (event.key === 'Enter') submitFlag(); }

        // Docker 제어 함수
        function manageContainer(action) {
            const id = document.getElementById('chalId').value;
            const port = document.getElementById('chalPort').value;
            const msgSpan = document.getElementById('dockerMsg');
            const btnStart = document.getElementById('btnStart');
            const btnStop = document.getElementById('btnStop');
            const labBtn = document.getElementById('modalLabBtn');

            // 1. 통신 시작 전 상태 저장 및 UI 잠금
            containerStates[id] = action === 'start' ? 'starting' : 'stopping';
            msgSpan.innerText = action === 'start' ? '⏳ 컨테이너 기동 중...' : '⏳ 컨테이너 종료 중...';
            msgSpan.style.color = '#FF5E00';
            btnStart.disabled = true;
            btnStop.disabled = true;

            // 2. 백엔드 통신
            fetch(`/api/docker/${action}/${id}`, { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                // 사용자가 모달을 닫고 다른 문제를 보고 있을 수 있으므로 현재 열려있는 모달의 ID인지 확인
                const currentModalId = document.getElementById('chalId').value;

                if (data.status === 'success') {
                    // 상태 업데이트
                    containerStates[id] = action === 'start' ? 'running' : 'stopped';
                    
                    // 현재 보고 있는 모달이 해당 문제일 때만 즉시 UI 갱신
                    if (currentModalId === id) {
                        msgSpan.innerText = data.message;
                        msgSpan.style.color = '#28a745';
                        if (action === 'start') {
                            btnStart.style.display = 'none';
                            btnStop.style.display = 'inline-block';
                            btnStop.disabled = false;
                            labBtn.classList.remove('disabled');
                            labBtn.innerText = '🚀 실습 페이지로 이동';
                        } else {
                            btnStop.style.display = 'none';
                            btnStart.style.display = 'inline-block';
                            btnStart.disabled = false;
                            labBtn.classList.add('disabled');
                            labBtn.innerText = `실습 접속 (Port: ${port})`;
                        }
                    }
                } else {
                    // 실패 시 원래 상태로 복구
                    containerStates[id] = 'stopped';
                    if (currentModalId === id) {
                        msgSpan.innerText = data.message;
                        msgSpan.style.color = '#dc3545';
                        btnStart.disabled = false;
                        btnStop.disabled = false;
                        if (action === 'start') {
                            btnStart.style.display = 'inline-block';
                            btnStop.style.display = 'none';
                        } else {
                            btnStart.style.display = 'none';
                            btnStop.style.display = 'inline-block';
                        }
                    }
                }
            })
            .catch(() => {
                containerStates[id] = 'stopped';
                const currentModalId = document.getElementById('chalId').value;
                if (currentModalId === id) {
                    msgSpan.innerText = '서버 통신 오류 발생';
                    msgSpan.style.color = '#dc3545';
                    btnStart.disabled = false;
                    btnStop.disabled = false;
                    btnStart.style.display = 'inline-block';
                    btnStop.style.display = 'none';
                }
            });
        }

        // 플래그 제출 함수
        function submitFlag() {
            const id = document.getElementById('chalId').value;
            const flag = document.getElementById('flagInput').value;
            const msgDiv = document.getElementById('msg');
            if (!flag) return;

            fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, flag: flag })
            })
            .then(res => res.json())
            .then(data => {
                msgDiv.innerText = data.message;
                if (data.status === 'success') {
                    msgDiv.className = 'success';
                    const card = document.getElementById('card-' + data.id);
                    if (card) card.classList.add('solved');
                    setTimeout(closeModal, 1500);
                } else { msgDiv.className = 'error'; }
            });
        }
    </script>
</body>
</html>
